###########################################################
### Beautiful Jekyll - lor3xsec blog
###########################################################

############################
# --- Required options --- #
############################

# Name of website
title: Blog

# Name to show in the footer
author: Lorenzo Gubbiotto

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  About Me: "aboutme"

################
# --- Logo --- #
################

avatar: "/assets/img/avatar.jpg"
round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "lorenzo.gubbiotto@gmail.com"
  github: lor3xsec
  linkedin: lorenzo-gubbiotto

rss-description: Offensive Security & Red Team Research

###########################
# --- General options --- #
###########################

share-links-active:
  twitter: false
  facebook: false
  linkedin: false
  vk: false
  reddit: false

url-pretty:

title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: false
navbar-var-length: false

######################################
# --- Colours / background image --- #
######################################

page-col: "#0d0d14"
text-col: "#c8d0e0"
link-col: "#00aaff"
hover-col: "#33ccff"
navbar-col: "#0a0a0f"
navbar-text-col: "#a0b0c8"
navbar-border-col: "#1a1a2e"
footer-col: "#0a0a0f"
footer-text-col: "#a0b0c8"
footer-link-col: "#00aaff"
footer-hover-col: "#33ccff"

################
# --- Misc --- #
################

date_format: "%B %-d, %Y"
timezone: "Europe/Rome"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: false
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

site-css:
  - "/assets/css/custom.css"